site_name: rad1an's blog
site_url: https://blog.r1a.nl/
theme:
  name: material

plugins:
  - search
  - blog:
      blog_dir: blog
  - rss:
      match_path: "blog/posts/.*\\.md"
      date_from_meta:
        as_creation: date

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
